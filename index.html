<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Ravishanker Product Designer portfolio" />
  <title>Ravishanker - Product Designer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <script>(function(){ var h=new Date().getHours(); document.body.dataset.theme=(h>=6&&h<18)?'light':'dark'; })();</script>
  <a href="#slides" class="skip-link">Skip to content</a>

  <div class="viewport carousel" aria-label="Portfolio carousel">
    <input type="radio" name="carousel" id="s1_fwd" checked aria-label="Slide 1 forward state" />
    <input type="radio" name="carousel" id="s2_fwd" aria-label="Slide 2 forward state" />
    <input type="radio" name="carousel" id="s1_bwd" aria-label="Slide 1 backward state" />
    <input type="radio" name="carousel" id="s2_bwd" aria-label="Slide 2 backward state" />
    <input type="radio" name="carousel" id="s3_fwd" aria-label="Slide 3 forward state" />
    <input type="radio" name="carousel" id="s1_from3_bwd" aria-label="Slide 1 backward from slide 3 state" />

    <button class="theme-toggle" aria-label="Toggle light/dark mode" onclick="toggleTheme()">
      <span class="theme-toggle__icon" aria-hidden="true">◐</span>
    </button>

    <div class="slides" id="slides">
      <!-- Slide 1: Index -->
      <section class="slide slide-1" aria-label="Index slide">
        <div class="content">
          <header aria-label="Header">
            <h1 class="brand" aria-label="Ravishanker">
              <label for="s3_fwd" class="brand__name" aria-label="Go to links slide">Ravishanker</label>
            </h1>

            <label for="s2_fwd" class="product-designer-link" aria-label="Go to companies slide">
              <span>Product</span>
              <span>Designer</span>
            </label>
          </header>

          <main aria-label="Locations">
            <section class="locations-outer" aria-label="Location carousel">
              <div class="locations" aria-hidden="true">
                <div class="location location--coimbatore">Coimbatore</div>
                <div class="location location--bengaluru">Bengaluru</div>
                <div class="location location--nyc">New York City</div>
              </div>
            </section>
          </main>
        </div>
      </section>

      <!-- Slide 2: Companies -->
      <section class="slide slide-2" aria-label="Companies slide">
        <label for="s1_bwd" class="back-btn" aria-label="Back to index">
          <span class="back-btn__arrow" aria-hidden="true">←</span>
        </label>

        <div class="content">
          <main class="company-main" aria-label="Company showcase">
            <nav class="company-list" aria-label="Work experience companies">
              <div class="company company--goldman" aria-label="Goldman Sachs">Goldman Sachs</div>
              <div class="company company--rga" aria-label="R/GA">R/GA</div>
              <div class="company company--sva" aria-label="SVA">SVA</div>
              <div class="company company--torry" aria-label="Torry Harris">Torry Harris</div>
            </nav>
          </main>
        </div>
      </section>

      <!-- Slide 3: Links -->
      <section class="slide slide-3" aria-label="Links slide">
        <label for="s1_from3_bwd" class="back-btn" aria-label="Back to index">
          <span class="back-btn__arrow" aria-hidden="true">←</span>
        </label>

        <div class="content">
          <main class="links-main" aria-label="Links">
            <nav class="links-list" aria-label="External links">
              <a href="./resume.pdf" download class="link-item" aria-label="Download Resume">Resume</a>
              <a href="https://www.linkedin.com/in/raviseethapathy/" target="_blank" rel="noreferrer" class="link-item link-item--linkedin" aria-label="LinkedIn">LinkedIn</a>
            </nav>
          </main>
        </div>
      </section>
    </div>
  </div>
  <script>
    function toggleTheme() {
      var isDark = document.body.dataset.theme === 'dark';
      var targetTheme = isDark ? 'light' : 'dark';
      var targetBg    = isDark ? '#ffffff' : '#000000';

      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.body.dataset.theme = targetTheme;
        return;
      }

      var overlay = document.createElement('div');
      overlay.setAttribute('aria-hidden', 'true');
      overlay.style.cssText =
        'position:fixed;inset:0;background:' + targetBg +
        ';clip-path:circle(0% at 100% 0%);z-index:99998;pointer-events:none;';
      document.body.appendChild(overlay);

      // Phase 1: expand to cover screen
      requestAnimationFrame(function() {
        overlay.style.transition = 'clip-path 0.6s cubic-bezier(0.77, 0, 0.175, 1)';
        overlay.style.clipPath = 'circle(150% at 100% 0%)';
      });

      overlay.addEventListener('transitionend', function onExpand() {
        overlay.removeEventListener('transitionend', onExpand);

        // Apply theme while fully hidden
        document.body.dataset.theme = targetTheme;

        // Phase 2: contract to reveal new theme
        requestAnimationFrame(function() {
          overlay.style.transition = 'clip-path 0.6s cubic-bezier(0.77, 0, 0.175, 1)';
          overlay.style.clipPath = 'circle(0% at 100% 0%)';
        });

        overlay.addEventListener('transitionend', function() {
          overlay.remove();
        }, { once: true });
      });
    }

    if (location.hash === '#back') {
      var s2bwd = document.getElementById('s2_bwd');
      var s1bwd = document.getElementById('s1_bwd');
      s2bwd.checked = true;
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          s1bwd.checked = true;
        });
      });
    }
  </script>
</body>
</html>
